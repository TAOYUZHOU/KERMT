# Plan A v3 Beta NLL 重训：300 epoch，早停 100，batch 128（其余对齐 with_features_v3_solv_gnn_cleaned_beta_nll）

data_path:          tlc/data/train.csv
separate_val_path:  tlc/data/valid.csv
separate_test_path: tlc/data/test.csv
checkpoint_path:    pretrained_models/grover_base.pt
save_dir:           tlc/results/with_features_v3_solv_gnn_beta_nll_ep300_es100_bs128

features_path:
  - tlc/data/train_features.npz
separate_val_features_path:
  - tlc/data/valid_features.npz
separate_test_features_path:
  - tlc/data/test_features.npz

dataset_type:   regression
regression_loss: beta_nll
metric:         mae
split_type:     scaffold_balanced
num_folds:      1
ensemble_size:  1
seed:           42

epochs:         300
batch_size:     128
max_lr:         1.0e-4
init_lr:        1.0e-4
final_lr:       2.0e-5
warmup_epochs:  20.0
weight_decay:   0.0
dropout:        0.0
early_stop_epoch: 100

solvent_emb_dim:  1
n_solvent_dims:   5
n_cross_dims:     10

ffn_hidden_size:  700
ffn_num_layers:   3
activation:       PReLU

self_attention: true
attn_hidden:    4
attn_out:       128
dist_coff:      0.15

bond_drop_rate: 0.1
no_features_scaling: true

no_cuda: false
gpu:     0

no_cache: true
