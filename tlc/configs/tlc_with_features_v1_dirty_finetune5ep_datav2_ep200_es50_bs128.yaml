# ============================================================
#  在 with_features_v1_dirty_finetune5ep 的 checkpoint 上，针对时间划分后的 data_v2（扁平 CSV+npz）微调。
#  结构对齐 tlc_with_features_v1_resume5ep：无 GNN 溶剂、700×3、self_attention、MSE+MAE 指标。
#  数据由 tlc/scripts/sequences_to_plan_a_csv_features.py 从 data_v2_cleaned/*_sequences.json 导出。
# ============================================================

data_path:          tlc/data/data_v2_cleaned/train.csv
separate_val_path:  tlc/data/data_v2_cleaned/valid.csv
separate_test_path: tlc/data/data_v2_cleaned/test.csv
checkpoint_path:    tlc/results/with_features_v1_dirty_finetune5ep/fold_0/model_0/model.pt
save_dir:           tlc/results/with_features_v1_dirty_finetune5ep_datav2_ep200_es50_bs128

features_path:
  - tlc/data/data_v2_cleaned/train_features.npz
separate_val_features_path:
  - tlc/data/data_v2_cleaned/valid_features.npz
separate_test_features_path:
  - tlc/data/data_v2_cleaned/test_features.npz

dataset_type:   regression
metric:         mae
split_type:     scaffold_balanced
num_folds:      1
ensemble_size:  1
seed:           42

epochs:         200
batch_size:     128
max_lr:         1.0e-4
init_lr:        1.0e-4
final_lr:       2.0e-5
warmup_epochs:  20.0
weight_decay:   0.0
dropout:        0.0
early_stop_epoch: 50

solvent_emb_dim:  0

ffn_hidden_size:  700
ffn_num_layers:   3
activation:       PReLU

self_attention: true
attn_hidden:    4
attn_out:       128
dist_coff:      0.15

bond_drop_rate: 0.1
no_features_scaling: true

no_cuda: false
gpu:     0

no_cache: true
