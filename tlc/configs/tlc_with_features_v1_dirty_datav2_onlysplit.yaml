# ============================================================
#  与 tlc/results/with_features_v1_dirty/config.yaml **除数据路径外完全一致**：
#  仅将 train/valid/test + features 换为 data_v2_cleaned（时间划分后的扁平 CSV+npz）。
#  Grover 起点、超参、结构、正则与 v1_dirty 对齐。
# ============================================================

data_path:          tlc/data/data_v2_cleaned/train.csv
separate_val_path:  tlc/data/data_v2_cleaned/valid.csv
separate_test_path: tlc/data/data_v2_cleaned/test.csv
checkpoint_path:    pretrained_models/grover_base.pt
save_dir:           tlc/results/with_features_v1_dirty_datav2_onlysplit

features_path:
  - tlc/data/data_v2_cleaned/train_features.npz
separate_val_features_path:
  - tlc/data/data_v2_cleaned/valid_features.npz
separate_test_features_path:
  - tlc/data/data_v2_cleaned/test_features.npz

dataset_type:   regression
metric:         mae
split_type:     scaffold_balanced
num_folds:      1
ensemble_size:  1
seed:           42

epochs:         200
batch_size:     64
max_lr:         1.0e-4
init_lr:        1.0e-4
final_lr:       2.0e-5
warmup_epochs:  20.0
weight_decay:   0.0
dropout:        0.0
early_stop_epoch: 20

solvent_emb_dim:  0

ffn_hidden_size:  700
ffn_num_layers:   3
activation:       PReLU

self_attention: true
attn_hidden:    4
attn_out:       128
dist_coff:      0.15

bond_drop_rate: 0.1
no_features_scaling: true

no_cuda: false
gpu:     0

no_cache: true
